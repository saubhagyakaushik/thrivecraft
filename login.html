<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ThriveCraft — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent1: #7c6bff;
    --accent2: #ff6b9d;
    --accent3: #6bffda;
    --text: #f0f0f8;
    --muted: #6b6b8a;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .scene {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Animated background */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,107,255,0.25) 0%, transparent 70%); top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,107,157,0.2) 0%, transparent 70%); bottom: -50px; right: 10%; animation-delay: -4s; }
  .orb3 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(107,255,218,0.15) 0%, transparent 70%); top: 30%; left: 60%; animation-delay: -8s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 60px) scale(1.1); }
  }

  /* Grid overlay */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Card */
  .card {
    position: relative; z-index: 10;
    width: 420px;
    background: rgba(19, 19, 26, 0.85);
    border: 1px solid rgba(124,107,255,0.2);
    border-radius: 24px;
    padding: 48px 40px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 40px 80px rgba(0,0,0,0.5), 0 0 80px rgba(124,107,255,0.08);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    opacity: 0;
    transform: translateY(30px);
  }
  @keyframes slideUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    justify-content: center;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(124,107,255,0.4);
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    background: linear-gradient(135deg, var(--text) 30%, var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
    font-style: italic;
    line-height: 1.5;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 22px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .section-sub {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  /* Google button */
  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 16px 24px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .btn-google::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,107,255,0.1), rgba(255,107,157,0.1));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-google:hover { border-color: rgba(124,107,255,0.5); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .btn-google:hover::before { opacity: 1; }
  .btn-google:active { transform: translateY(0); }

  .google-icon { width: 20px; height: 20px; flex-shrink: 0; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Features */
  .features {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 32px;
  }
  .feat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    transition: all 0.2s;
  }
  .feat:hover { border-color: rgba(124,107,255,0.3); color: var(--text); }
  .feat-icon { font-size: 16px; }

  /* Loading state */
  .loading-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,15,0.9);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(8px);
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(124,107,255,0.2);
    border-top-color: var(--accent1);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error toast */
  .toast {
    position: fixed;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.3);
    color: #ff6b6b;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px;
    backdrop-filter: blur(12px);
    transition: transform 0.3s ease;
    z-index: 200;
    max-width: 360px;
    text-align: center;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .privacy {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    margin-top: 24px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid-overlay"></div>

<div class="scene">
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">🚀</div>
      <div class="logo-text">ThriveCraft</div>
    </div>

    <p class="tagline">Your personal productivity universe.<br/>Goals turned into action, every day.</p>

    <div class="section-title">Welcome back</div>
    <div class="section-sub">Sign in to continue your journey</div>

    <button class="btn-google" id="googleSignIn" onclick="handleGoogleSignIn()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="features">
      <div class="feat"><span class="feat-icon">🎯</span> Task Whisper</div>
      <div class="feat"><span class="feat-icon">⏱️</span> Focus Flow</div>
      <div class="feat"><span class="feat-icon">🏆</span> Habit Quest</div>
      <div class="feat"><span class="feat-icon">🤖</span> AI Coworker</div>
    </div>

    <p class="privacy">By signing in, you agree to sync your data securely.<br/>Your privacy is our priority.</p>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color: var(--muted); font-size: 14px;">Signing you in…</p>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDFYvKG99HX5AhArWfHM5ZflDrs1mQm2p8",
  authDomain: "viento-sites.firebaseapp.com",
  projectId: "viento-sites",
  storageBucket: "viento-sites.firebasestorage.app",
  messagingSenderId: "7360816063",
  appId: "1:7360816063:web:5e570cfee42120730bb70a",
  measurementId: "G-SE01D2KPR0"
  };

  // NOTE: Replace firebaseConfig with your actual Firebase project config.
  // The Google Client ID is: 7360816063-vctfl6t0n074bb8rpmkdunlqhuhlgv7s.apps.googleusercontent.com

  let app, auth, provider;
  try {
    app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    provider = new GoogleAuthProvider();
    provider.setCustomParameters({ client_id: '7360816063-vctfl6t0n074bb8rpmkdunlqhuhlgv7s.apps.googleusercontent.com' });
  } catch(e) {
    console.warn('Firebase init error (configure your firebase project):', e);
  }

  window.handleGoogleSignIn = async function() {
    if (!auth) {
      showToast('Please configure Firebase in login.html first.');
      return;
    }
    document.getElementById('loadingOverlay').classList.add('show');
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;
      // Store user info
      localStorage.setItem('tc_user', JSON.stringify({
        uid: user.uid,
        name: user.displayName,
        email: user.email,
        photo: user.photoURL
      }));
      window.location.href = 'app.html';
    } catch (err) {
      document.getElementById('loadingOverlay').classList.remove('show');
      if (err.code !== 'auth/popup-closed-by-user') {
        showToast(err.message || 'Sign-in failed. Please try again.');
      }
    }
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  // Check if already logged in
  const stored = localStorage.getItem('tc_user');
  if (stored) {
    window.location.href = 'app.html';
  }
</script>
</body>
</html>
